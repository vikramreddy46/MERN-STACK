<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Q5a - Factorial and Fibonacci</title>
</head>
<body>

  <h1>Q5a: Factorial and Fibonacci</h1>

  Enter a number: <input type="number" id="num" value="6">
  <button onclick="calculate()">Calculate</button>
  <p id="result"></p>

  <script>
    function factorial(n) {
      let fact = 1;
      for (let i = 1; i <= n; i++) {
        fact *= i;
      }
      return fact;
    }

    function fibonacci(n) {
      let a = 0, b = 1, temp;
      let series = "0 1 ";
      for (let i = 2; i < n; i++) {
        temp = a + b;
        series += temp + " ";
        a = b;
        b = temp;
      }
      return series;
    }

    function calculate() {
      let n = parseInt(document.getElementById("num").value);
      document.getElementById("result").innerHTML =
        "Factorial of " + n + " = " + factorial(n) + "<br>" +
        "Fibonacci Series: " + fibonacci(n);
    }
  </script>

</body>
</html>
