<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Q1d - HTML Tables</title>
</head>
<body>

  <h1>Q1d: HTML Tables with border, rowspan and colspan</h1>

  <table border="1">
    <!-- rowspan="2" makes Student ID and Name span 2 rows -->
    <!-- colspan="2" makes Marks span 2 columns -->
    <tr>
      <th rowspan="2">Student ID</th>
      <th rowspan="2">Name</th>
      <th colspan="2">Marks</th>
    </tr>
    <tr>
      <th>Maths</th>
      <th>Science</th>
    </tr>
    <tr>
      <td>101</td>
      <td>Ravi</td>
      <td>85</td>
      <td>90</td>
    </tr>
    <tr>
      <td>102</td>
      <td>Priya</td>
      <td>92</td>
      <td>88</td>
    </tr>
    <tr>
      <td>103</td>
      <td>Karthik</td>
      <td>76</td>
      <td>80</td>
    </tr>
  </table>

</body>
</html>
