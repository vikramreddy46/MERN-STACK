<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Q1c - Images Linking to Profiles</title>
  <style>
    .container { display: flex; gap: 30px; padding: 20px; }
    .profile   { text-align: center; }
    .profile img { border-radius: 8px; display: block; }
    .caption   { margin-top: 8px; font-family: Arial; }
  </style>
</head>
<body>

  <h1>Q1c: Images Linking to Profiles</h1>

  <div class="container">

    <!-- Your Profile -->
    <div class="profile">
      <a href="https://example.com/my-profile" target="_blank" title="Go to my profile">
        <img src="https://via.placeholder.com/150/0000FF/FFFFFF?text=Me"
             alt="My Name" width="150" height="150">
      </a>
      <div class="caption">Your Name</div>
    </div>

    <!-- Friend's Profile -->
    <div class="profile">
      <a href="https://example.com/friend-profile" target="_blank" title="Go to friend's profile">
        <img src="https://via.placeholder.com/150/FF0000/FFFFFF?text=Friend"
             alt="Friend Name" width="150" height="150">
      </a>
      <div class="caption">Friend's Name</div>
    </div>

  </div>

</body>
</html>
