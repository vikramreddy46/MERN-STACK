<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Q4b - Larger Number Among Three</title>
</head>
<body>

  <h1>Q4b: Find the Larger Number Among Three Integers</h1>

  <script>
    let a = parseInt(prompt("Enter first number:"));
    let b = parseInt(prompt("Enter second number:"));
    let c = parseInt(prompt("Enter third number:"));

    if (a > b && a > c) {
      document.write("<h2>" + a + " is the LARGEST NUMBER</h2>");
      alert(a + " is the LARGEST NUMBER");
    } else if (b > a && b > c) {
      document.write("<h2>" + b + " is the LARGEST NUMBER</h2>");
      alert(b + " is the LARGEST NUMBER");
    } else if (c > a && c > b) {
      document.write("<h2>" + c + " is the LARGEST NUMBER</h2>");
      alert(c + " is the LARGEST NUMBER");
    } else {
      document.write("<h2>EQUAL NUMBERS</h2>");
      alert("EQUAL NUMBERS");
    }
  </script>

</body>
</html>
