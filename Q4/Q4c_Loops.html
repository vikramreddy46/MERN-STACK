<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Q4c - Loops in JavaScript</title>
</head>
<body>

  <h1>Q4c: Loops in JavaScript</h1>

  <h2>For Loop (1 to 10)</h2>
  <script>
    for (let i = 1; i <= 10; i++) {
      document.write(i + " ");
    }
  </script>

  <h2>While Loop (1 to 10)</h2>
  <script>
    let j = 1;
    while (j <= 10) {
      document.write(j + " ");
      j++;
    }
  </script>

  <h2>Do-While Loop (1 to 10)</h2>
  <script>
    let k = 1;
    do {
      document.write(k + " ");
      k++;
    } while (k <= 10);
  </script>

</body>
</html>
