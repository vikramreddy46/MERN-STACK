<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Q2b - Audio and Video</title>
</head>
<body>

  <h1>Q2b: Embedding Audio and Video in HTML</h1>

  <h2>Audio Example</h2>
  <audio controls>
    <source src="sample-audio.mp3" type="audio/mpeg">
    Your browser does not support the audio element.
  </audio>

  <h2>Video Example</h2>
  <video width="400" height="300" controls>
    <source src="sample-video.mp4" type="video/mp4">
    Your browser does not support the video element.
  </video>

  <h2>Explanation</h2>
  <ul>
    <li><b>&lt;audio&gt;</b> – embeds sound on the page</li>
    <li><b>&lt;video&gt;</b> – embeds video on the page</li>
    <li><b>controls</b> – shows play, pause, volume controls</li>
    <li><b>&lt;source&gt;</b> – specifies the media file and type</li>
  </ul>

  <!-- Note: Place sample-audio.mp3 and sample-video.mp4 in the same folder -->

</body>
</html>
