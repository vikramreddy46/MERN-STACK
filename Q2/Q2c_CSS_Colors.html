<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Q2c - CSS Color Representations</title>
  <style>
    body { font-family: Arial, sans-serif; }

    /* 1. Color Name */
    .color-name  { color: blue; }

    /* 2. Hexadecimal */
    .hex-color   { color: #8B0000; }

    /* 3. RGB */
    .rgb-color   { color: rgb(0, 128, 0); }

    /* 4. RGBA (with transparency) */
    .rgba-color  { color: rgba(255, 69, 0, 0.8); }

    /* 5. HSL */
    .hsl-color   { color: hsl(240, 100%, 40%); }

    /* 6. HSLA (with transparency) */
    .hsla-color  { color: hsla(300, 100%, 30%, 0.9); }
  </style>
</head>
<body>

  <h1>Q2c: CSS Color Representations</h1>

  <h2 class="color-name">1. Color Name &nbsp; → &nbsp; color: blue</h2>
  <h2 class="hex-color">2. Hexadecimal &nbsp; → &nbsp; color: #8B0000</h2>
  <h2 class="rgb-color">3. RGB &nbsp; → &nbsp; color: rgb(0, 128, 0)</h2>
  <h2 class="rgba-color">4. RGBA &nbsp; → &nbsp; color: rgba(255, 69, 0, 0.8)</h2>
  <h2 class="hsl-color">5. HSL &nbsp; → &nbsp; color: hsl(240, 100%, 40%)</h2>
  <h2 class="hsla-color">6. HSLA &nbsp; → &nbsp; color: hsla(300, 100%, 30%, 0.9)</h2>

</body>
</html>
